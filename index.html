<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Map Selector</title>

  <!-- PWA / SEO meta -->
  <meta name="description" content="Visual zip code and census tract selector">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MapSelect">

  <!-- Open Graph -->
  <meta property="og:title" content="Map Selector">
  <meta property="og:description" content="Visual zip code and census tract selector">
  <meta property="og:type" content="website">

  <!-- Icons & manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Map ────────────────────────────────────────────────────── */

    #map-container {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #map { height: 100%; width: 100%; }

    #map-controls {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    #state-selector, #mode-selector {
      background: #fff;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      min-height: 36px;
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.8);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #333;
    }

    #loading-overlay.hidden { display: none; }

    /* ── Sidebar / Bottom sheet ──────────────────────────────────── */

    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
    }

    /* Drag handle — desktop: hidden */
    #sidebar-drag-handle {
      display: none;
    }

    /* Sidebar header row — desktop: normal block flow */
    #sidebar-header {
      display: block;
      margin-bottom: 12px;
    }

    #sidebar h2 {
      font-size: 18px;
      color: #f5f5f5;
    }

    /* Toggle button — desktop: hidden */
    #sidebar-toggle {
      display: none;
    }

    #zip-count {
      font-size: 13px;
      color: #a6adc8;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    #zip-list-container {
      flex: 1;
      overflow-y: auto;
      background: #181825;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #313244;
      min-height: 0; /* allow flex shrinking */
    }

    #zip-list {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      color: #89b4fa;
    }

    #empty-state {
      color: #585b70;
      font-style: italic;
      font-size: 13px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
      min-height: 44px;
    }

    .btn-primary {
      background: #89b4fa;
      color: #1e1e2e;
    }

    .btn-primary:hover { background: #74c7ec; }

    .btn-danger {
      background: #45475a;
      color: #cdd6f4;
    }

    .btn-danger:hover { background: #585b70; }

    .btn-import {
      background: #45475a;
      color: #cdd6f4;
    }

    .btn-import:hover { background: #585b70; }

    .btn-export-opposite {
      background: #a6e3a1;
      color: #1e1e2e;
    }

    .btn-export-opposite:hover { background: #94e2d5; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Import modal ──────────────────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      color: #cdd6f4;
    }

    .modal-box h3 {
      font-size: 16px;
      color: #f5f5f5;
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 13px;
      color: #a6adc8;
      margin-bottom: 12px;
    }

    .modal-box textarea {
      width: 100%;
      background: #181825;
      color: #89b4fa;
      border: 1px solid #313244;
      border-radius: 6px;
      padding: 12px;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }

    .modal-box textarea:focus {
      border-color: #89b4fa;
    }

    .import-error {
      font-size: 12px;
      color: #f38ba8;
      min-height: 18px;
      margin-top: 6px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      width: auto;
      padding: 8px 20px;
    }

    #copy-feedback {
      font-size: 12px;
      color: #a6e3a1;
      text-align: center;
      height: 18px;
      margin-bottom: 4px;
    }

    #error-banner {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1002;
      background: #f38ba8;
      color: #1e1e2e;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      max-width: 500px;
      text-align: center;
    }

    #map-coords {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 11px;
      color: #585b70;
      text-align: center;
      padding-top: 10px;
      border-top: 1px solid #313244;
      margin-top: 8px;
      line-height: 1.6;
      user-select: all;
    }

    /* ── Mobile (≤768px) ─────────────────────────────────────────── */

    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow: hidden;
      }

      /* Map takes full screen; sheet overlays it */
      #map-container {
        position: fixed;
        inset: 0;
        height: 100%;
        width: 100%;
      }

      /* ── Bottom sheet ── */
      #sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        min-width: 0;
        height: 72vh;
        max-height: 85vh;
        border-radius: 16px 16px 0 0;
        padding: 0 16px 20px;
        /* Peek: show drag handle + header row (~64px) */
        transform: translateY(calc(100% - 64px));
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1002;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }

      #sidebar.panel-open {
        transform: translateY(0);
      }

      /* Drag handle */
      #sidebar-drag-handle {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 20px;
        cursor: pointer;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
      }

      #sidebar-drag-handle::before {
        content: '';
        display: block;
        width: 40px;
        height: 4px;
        background: #585b70;
        border-radius: 2px;
      }

      /* Header row: title + count on left, toggle arrow on right */
      #sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0;
        padding: 4px 0 10px;
        cursor: pointer;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
        min-height: 44px;
      }

      #sidebar h2 {
        font-size: 16px;
        margin-bottom: 0;
      }

      #zip-count {
        font-size: 12px;
        margin: 0;
        color: #a6adc8;
      }

      /* Title + count stacked in header */
      #sidebar-header-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      /* Toggle chevron button */
      #sidebar-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: #a6adc8;
        font-size: 20px;
        cursor: pointer;
        padding: 0;
        min-width: 44px;
        min-height: 44px;
        transition: transform 0.3s ease;
        flex-shrink: 0;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
      }

      #sidebar.panel-open #sidebar-toggle {
        transform: rotate(180deg);
      }

      /* Scrollable content area */
      #sidebar-content {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      #zip-list-container {
        flex: 1;
        min-height: 0;
        margin-bottom: 12px;
      }

      .btn {
        min-height: 48px;
        font-size: 15px;
      }

      /* Touch-friendly map controls */
      #state-selector,
      #mode-selector {
        font-size: 16px; /* prevents iOS auto-zoom on focus */
        min-height: 44px;
        padding: 8px 12px;
        border-radius: 6px;
      }

      /* Push controls right of zoom control */
      #map-controls {
        left: 54px;
        top: 8px;
        gap: 6px;
        max-width: calc(100vw - 64px);
      }

      /* Leaflet zoom controls — bigger tap targets on mobile */
      .leaflet-touch .leaflet-control-zoom a {
        width: 36px;
        height: 36px;
        line-height: 36px;
        font-size: 18px;
      }

      #map-coords {
        display: none; /* hide coordinate readout on mobile — limited space */
      }

      #copy-feedback {
        font-size: 13px;
        height: 20px;
      }
    }

    /* Very small screens (≤480px) */
    @media (max-width: 480px) {
      #sidebar {
        height: 78vh;
      }

      #state-selector,
      #mode-selector {
        max-width: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="map-container">
    <div id="map-controls">
      <select id="state-selector"></select>
      <select id="mode-selector">
        <option value="zip">Zip Codes</option>
        <option value="tract" selected>Census Tracts</option>
      </select>
    </div>
    <div id="loading-overlay" class="hidden">Loading boundaries…</div>
    <div id="error-banner"></div>
    <div id="map"></div>
  </div>

  <div id="sidebar">
    <!-- Mobile drag handle (tap or drag to toggle) -->
    <div id="sidebar-drag-handle" role="button" aria-label="Toggle panel" tabindex="0"></div>

    <!-- Header: always visible in peek state -->
    <div id="sidebar-header" role="button" aria-expanded="false" tabindex="0">
      <div id="sidebar-header-text">
        <h2 id="sidebar-title">Selected Tracts</h2>
        <div id="zip-count">Count: 0</div>
      </div>
      <button id="sidebar-toggle" aria-label="Toggle selection panel">&#8964;</button>
    </div>

    <!-- Scrollable content (zip list + buttons) -->
    <div id="sidebar-content">
      <div id="zip-list-container">
        <pre id="zip-list"><span id="empty-state">Click areas on the map to select them.</span></pre>
      </div>
      <div id="copy-feedback"></div>
      <button class="btn btn-primary" id="copy-btn" disabled>Copy to Clipboard</button>
      <button class="btn btn-export-opposite" id="export-opposite-btn" disabled>Copy as Zips</button>
      <button class="btn btn-import" id="import-btn">Import JSON</button>
      <button class="btn btn-danger" id="clear-btn" disabled>Clear All</button>

      <!-- Import modal -->
      <div id="import-modal" class="modal-overlay hidden">
        <div class="modal-box">
          <h3>Import Selections</h3>
          <p class="modal-desc">Paste a JSON array of IDs (same format as the copy output):</p>
          <textarea id="import-textarea" placeholder='["20814", "20815", "20816"]' rows="8" spellcheck="false"></textarea>
          <div id="import-error" class="import-error"></div>
          <div class="modal-actions">
            <button class="btn btn-danger modal-btn" id="import-cancel">Cancel</button>
            <button class="btn btn-primary modal-btn" id="import-confirm">Import</button>
          </div>
        </div>
      </div>
      <div id="map-coords"></div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      // ─── State list & GeoJSON URL builders ──────────────────────────────
      //
      // Zip data:   OpenDataDE/State-zip-code-GeoJSON on GitHub
      // Tract data: US Census Bureau CitySDK (500k cartographic boundaries, 2022)

      const STATES = [
        { abbr: 'AL', name: 'Alabama',              file: 'al_alabama',              fips: '01' },
        { abbr: 'AK', name: 'Alaska',               file: 'ak_alaska',               fips: '02' },
        { abbr: 'AZ', name: 'Arizona',              file: 'az_arizona',              fips: '04' },
        { abbr: 'AR', name: 'Arkansas',              file: 'ar_arkansas',             fips: '05' },
        { abbr: 'CA', name: 'California',            file: 'ca_california',           fips: '06' },
        { abbr: 'CO', name: 'Colorado',              file: 'co_colorado',             fips: '08' },
        { abbr: 'CT', name: 'Connecticut',           file: 'ct_connecticut',          fips: '09' },
        { abbr: 'DE', name: 'Delaware',              file: 'de_delaware',             fips: '10' },
        { abbr: 'DC', name: 'District of Columbia',  file: 'dc_district_of_columbia', fips: '11' },
        { abbr: 'FL', name: 'Florida',               file: 'fl_florida',              fips: '12' },
        { abbr: 'GA', name: 'Georgia',               file: 'ga_georgia',              fips: '13' },
        { abbr: 'HI', name: 'Hawaii',                file: 'hi_hawaii',               fips: '15' },
        { abbr: 'ID', name: 'Idaho',                 file: 'id_idaho',                fips: '16' },
        { abbr: 'IL', name: 'Illinois',              file: 'il_illinois',             fips: '17' },
        { abbr: 'IN', name: 'Indiana',               file: 'in_indiana',              fips: '18' },
        { abbr: 'IA', name: 'Iowa',                  file: 'ia_iowa',                 fips: '19' },
        { abbr: 'KS', name: 'Kansas',                file: 'ks_kansas',               fips: '20' },
        { abbr: 'KY', name: 'Kentucky',              file: 'ky_kentucky',             fips: '21' },
        { abbr: 'LA', name: 'Louisiana',             file: 'la_louisiana',            fips: '22' },
        { abbr: 'ME', name: 'Maine',                 file: 'me_maine',                fips: '23' },
        { abbr: 'MD', name: 'Maryland',              file: 'md_maryland',             fips: '24' },
        { abbr: 'MA', name: 'Massachusetts',         file: 'ma_massachusetts',        fips: '25' },
        { abbr: 'MI', name: 'Michigan',              file: 'mi_michigan',             fips: '26' },
        { abbr: 'MN', name: 'Minnesota',             file: 'mn_minnesota',            fips: '27' },
        { abbr: 'MS', name: 'Mississippi',           file: 'ms_mississippi',          fips: '28' },
        { abbr: 'MO', name: 'Missouri',              file: 'mo_missouri',             fips: '29' },
        { abbr: 'MT', name: 'Montana',               file: 'mt_montana',              fips: '30' },
        { abbr: 'NE', name: 'Nebraska',              file: 'ne_nebraska',             fips: '31' },
        { abbr: 'NV', name: 'Nevada',                file: 'nv_nevada',               fips: '32' },
        { abbr: 'NH', name: 'New Hampshire',         file: 'nh_new_hampshire',        fips: '33' },
        { abbr: 'NJ', name: 'New Jersey',            file: 'nj_new_jersey',           fips: '34' },
        { abbr: 'NM', name: 'New Mexico',            file: 'nm_new_mexico',           fips: '35' },
        { abbr: 'NY', name: 'New York',              file: 'ny_new_york',             fips: '36' },
        { abbr: 'NC', name: 'North Carolina',        file: 'nc_north_carolina',       fips: '37' },
        { abbr: 'ND', name: 'North Dakota',          file: 'nd_north_dakota',         fips: '38' },
        { abbr: 'OH', name: 'Ohio',                  file: 'oh_ohio',                 fips: '39' },
        { abbr: 'OK', name: 'Oklahoma',              file: 'ok_oklahoma',             fips: '40' },
        { abbr: 'OR', name: 'Oregon',                file: 'or_oregon',               fips: '41' },
        { abbr: 'PA', name: 'Pennsylvania',          file: 'pa_pennsylvania',         fips: '42' },
        { abbr: 'RI', name: 'Rhode Island',          file: 'ri_rhode_island',         fips: '44' },
        { abbr: 'SC', name: 'South Carolina',        file: 'sc_south_carolina',       fips: '45' },
        { abbr: 'SD', name: 'South Dakota',          file: 'sd_south_dakota',         fips: '46' },
        { abbr: 'TN', name: 'Tennessee',             file: 'tn_tennessee',            fips: '47' },
        { abbr: 'TX', name: 'Texas',                 file: 'tx_texas',                fips: '48' },
        { abbr: 'UT', name: 'Utah',                  file: 'ut_utah',                 fips: '49' },
        { abbr: 'VT', name: 'Vermont',               file: 'vt_vermont',              fips: '50' },
        { abbr: 'VA', name: 'Virginia',              file: 'va_virginia',             fips: '51' },
        { abbr: 'WA', name: 'Washington',            file: 'wa_washington',           fips: '53' },
        { abbr: 'WV', name: 'West Virginia',         file: 'wv_west_virginia',        fips: '54' },
        { abbr: 'WI', name: 'Wisconsin',             file: 'wi_wisconsin',            fips: '55' },
        { abbr: 'WY', name: 'Wyoming',               file: 'wy_wyoming',              fips: '56' },
      ];

      const ZIP_BASE_URL = 'https://raw.githubusercontent.com/OpenDataDE/State-zip-code-GeoJSON/master';
      const TRACT_BASE_URL = 'https://raw.githubusercontent.com/uscensusbureau/citysdk/master/v2/GeoJSON/500k/2022';

      const zipUrl = (stateFile) =>
        `${ZIP_BASE_URL}/${stateFile}_zip_codes_geo.min.json`;

      const tractUrl = (fips) =>
        `${TRACT_BASE_URL}/${fips}/tract.json`;

      // ─── DOM refs ───────────────────────────────────────────────────────

      const stateSelect   = document.getElementById('state-selector');
      const modeSelect    = document.getElementById('mode-selector');
      const sidebarTitle  = document.getElementById('sidebar-title');
      const loadingEl     = document.getElementById('loading-overlay');
      const errorBanner   = document.getElementById('error-banner');
      const zipListEl     = document.getElementById('zip-list');
      const emptyStateEl  = document.getElementById('empty-state');
      const zipCountEl    = document.getElementById('zip-count');
      const copyBtn       = document.getElementById('copy-btn');
      const clearBtn      = document.getElementById('clear-btn');
      const copyFeedback  = document.getElementById('copy-feedback');
      const mapCoordsEl      = document.getElementById('map-coords');
      const sidebar          = document.getElementById('sidebar');
      const sidebarHeader    = document.getElementById('sidebar-header');
      const sidebarHandle    = document.getElementById('sidebar-drag-handle');
      const sidebarToggle    = document.getElementById('sidebar-toggle');
      const exportOppositeBtn = document.getElementById('export-opposite-btn');
      const importBtn        = document.getElementById('import-btn');
      const importModal      = document.getElementById('import-modal');
      const importTextarea   = document.getElementById('import-textarea');
      const importError      = document.getElementById('import-error');
      const importConfirm    = document.getElementById('import-confirm');
      const importCancel     = document.getElementById('import-cancel');

      // ─── Mobile panel toggle ────────────────────────────────────────────

      const isMobile = () => window.innerWidth <= 768;

      let panelOpen = false;

      const openPanel = () => {
        panelOpen = true;
        sidebar.classList.add('panel-open');
        sidebarHeader.setAttribute('aria-expanded', 'true');
      };

      const closePanel = () => {
        panelOpen = false;
        sidebar.classList.remove('panel-open');
        sidebarHeader.setAttribute('aria-expanded', 'false');
      };

      const togglePanel = () => {
        if (panelOpen) closePanel();
        else openPanel();
      };

      // Toggle on header click (mobile only — on desktop these have no toggle behavior)
      sidebarHeader.addEventListener('click', () => {
        if (isMobile()) togglePanel();
      });
      sidebarHandle.addEventListener('click', () => {
        if (isMobile()) togglePanel();
      });
      sidebarToggle.addEventListener('click', (e) => {
        e.stopPropagation(); // prevent double-fire with header click
        if (isMobile()) togglePanel();
      });

      // Keyboard accessibility for handle and header
      [sidebarHandle, sidebarHeader].forEach(el => {
        el.addEventListener('keydown', (e) => {
          if ((e.key === 'Enter' || e.key === ' ') && isMobile()) {
            e.preventDefault();
            togglePanel();
          }
        });
      });

      // ─── App state ─────────────────────────────────────────────────────

      const selectedItems = new Set();
      let geoJsonLayer = null;
      let currentMode = 'tract'; // 'zip' or 'tract'

      // ─── localStorage persistence ───────────────────────────────────────

      const STORAGE_KEY = 'mapSelectorState';

      const saveState = () => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            state: stateSelect.value,
            mode: currentMode,
            selections: Array.from(selectedItems),
          }));
        } catch (e) {
          console.warn('Failed to save state to localStorage:', e);
        }
      };

      const clearSavedState = () => {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {
          console.warn('Failed to clear localStorage:', e);
        }
      };

      const loadSavedState = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (typeof parsed !== 'object' || parsed === null) return null;
          if (typeof parsed.state !== 'string') return null;
          if (typeof parsed.mode !== 'string' || !['zip', 'tract'].includes(parsed.mode)) return null;
          if (!Array.isArray(parsed.selections)) return null;
          if (!STATES.find(s => s.file === parsed.state)) return null;
          return parsed;
        } catch (e) {
          console.warn('Failed to load state from localStorage:', e);
          return null;
        }
      };

      // ─── Map setup ─────────────────────────────────────────────────────

      const map = L.map('map', { zoomControl: true }).setView([39.0323, -77.1014], 11);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(map);

      // ─── Coordinates display ───────────────────────────────────────────

      const updateCoords = () => {
        const c = map.getCenter();
        const z = map.getZoom();
        mapCoordsEl.textContent = `Lat: ${c.lat.toFixed(4)}  Lng: ${c.lng.toFixed(4)}  Zoom: ${z}`;
      };
      map.on('moveend', updateCoords);
      updateCoords();

      // ─── Styles ────────────────────────────────────────────────────────

      const defaultStyle = {
        color: '#555',
        weight: 1,
        fillColor: '#e0e0e0',
        fillOpacity: 0.1,
      };

      const hoverStyle = {
        fillColor: '#ffd866',
        fillOpacity: 0.35,
      };

      const selectedStyle = {
        fillColor: '#3388ff',
        fillOpacity: 0.5,
      };

      // ─── Sidebar rendering ─────────────────────────────────────────────

      const updateSidebar = () => {
        const count = selectedItems.size;
        zipCountEl.textContent = `Count: ${count}`;
        copyBtn.disabled = count === 0;
        exportOppositeBtn.disabled = count === 0;
        clearBtn.disabled = count === 0;

        if (count === 0) {
          zipListEl.innerHTML = '';
          zipListEl.appendChild(emptyStateEl);
          emptyStateEl.style.display = 'block';
          return;
        }

        emptyStateEl.style.display = 'none';
        const sorted = Array.from(selectedItems).sort();
        const json = JSON.stringify(sorted, null, 2);
        zipListEl.textContent = json;

        // On mobile, auto-open the panel when something is selected
        if (isMobile() && !panelOpen && count === 1) {
          openPanel();
        }
      };

      const updateModeUI = () => {
        sidebarTitle.textContent = currentMode === 'tract' ? 'Selected Tracts' : 'Selected Zips';
        exportOppositeBtn.textContent = currentMode === 'tract' ? 'Copy as Zips' : 'Copy as Tracts';
        emptyStateEl.textContent = 'Click areas on the map to select them.';
      };

      // ─── Feature interaction ────────────────────────────────────────────

      const getFeatureId = (feature) => {
        const props = feature.properties || {};
        if (currentMode === 'tract') {
          return props.GEOID || null;
        }
        return props.ZCTA5CE10 || props.ZIP || props.ZIPCODE || props.zip || null;
      };

      const getTooltipText = (feature) => {
        const props = feature.properties || {};
        if (currentMode === 'tract') {
          const name = props.NAMELSAD || props.NAME || props.GEOID;
          const county = props.NAMELSADCO ? ` (${props.NAMELSADCO})` : '';
          return `${name}${county}`;
        }
        return getFeatureId(feature);
      };

      const onEachFeature = (feature, layer) => {
        const id = getFeatureId(feature);
        if (!id) return;

        // Tooltip: shown on hover (desktop) — not shown on touch
        layer.bindTooltip(getTooltipText(feature), { sticky: true, className: 'zip-tooltip' });

        layer.on('mouseover', () => {
          if (!selectedItems.has(id)) {
            layer.setStyle(hoverStyle);
          }
        });

        layer.on('mouseout', () => {
          if (!selectedItems.has(id)) {
            layer.setStyle(defaultStyle);
          }
        });

        layer.on('click', (e) => {
          // Close bottom sheet on mobile so user can see the map after tapping
          if (isMobile() && panelOpen) {
            closePanel();
          }
          if (selectedItems.has(id)) {
            selectedItems.delete(id);
            layer.setStyle(defaultStyle);
          } else {
            selectedItems.add(id);
            layer.setStyle(selectedStyle);
          }
          updateSidebar();
          saveState();
          L.DomEvent.stopPropagation(e);
        });
      };

      // ─── State loading ─────────────────────────────────────────────────

      const showLoading = () => loadingEl.classList.remove('hidden');
      const hideLoading = () => loadingEl.classList.add('hidden');

      const showError = (msg) => {
        errorBanner.textContent = msg;
        errorBanner.style.display = 'block';
        setTimeout(() => { errorBanner.style.display = 'none'; }, 6000);
      };

      const getSelectedState = () => {
        const val = stateSelect.value;
        return STATES.find(s => s.file === val) || STATES.find(s => s.abbr === 'MD');
      };

      const loadData = async (restoreSelections = null) => {
        showLoading();
        errorBanner.style.display = 'none';

        // Clear previous data
        selectedItems.clear();
        updateSidebar();
        if (geoJsonLayer) {
          map.removeLayer(geoJsonLayer);
          geoJsonLayer = null;
        }

        const state = getSelectedState();
        const url = currentMode === 'tract' ? tractUrl(state.fips) : zipUrl(state.file);
        const label = currentMode === 'tract' ? 'tract' : 'zip';

        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
          const data = await resp.json();

          geoJsonLayer = L.geoJSON(data, {
            style: defaultStyle,
            onEachFeature,
          }).addTo(map);

          // Restore previously selected items (if any)
          if (restoreSelections && restoreSelections.length > 0) {
            const restoreSet = new Set(restoreSelections);
            geoJsonLayer.eachLayer((layer) => {
              const id = layer.feature ? getFeatureId(layer.feature) : null;
              if (id && restoreSet.has(id)) {
                selectedItems.add(id);
                layer.setStyle(selectedStyle);
              }
            });
            updateSidebar();
          }

          map.fitBounds(geoJsonLayer.getBounds(), { padding: [20, 20] });
        } catch (err) {
          showError(`Failed to load ${label} boundaries: ${err.message}`);
        } finally {
          hideLoading();
        }
      };

      // ─── State dropdown ─────────────────────────────────────────────────

      STATES.forEach(({ abbr, name, file }) => {
        const opt = document.createElement('option');
        opt.value = file;
        opt.textContent = `${abbr} — ${name}`;
        if (abbr === 'MD') opt.selected = true;
        stateSelect.appendChild(opt);
      });

      stateSelect.addEventListener('change', () => {
        saveState();
        loadData();
      });

      modeSelect.addEventListener('change', () => {
        currentMode = modeSelect.value;
        updateModeUI();
        saveState();
        loadData();
      });

      // ─── Copy / Clear buttons ───────────────────────────────────────────

      copyBtn.addEventListener('click', async () => {
        const sorted = Array.from(selectedItems).sort();
        const json = JSON.stringify(sorted, null, 2);
        try {
          await navigator.clipboard.writeText(json);
          copyFeedback.textContent = 'Copied!';
        } catch {
          copyFeedback.textContent = 'Copy failed — use HTTPS or localhost.';
        }
        setTimeout(() => { copyFeedback.textContent = ''; }, 2000);
      });

      clearBtn.addEventListener('click', () => {
        selectedItems.clear();
        if (geoJsonLayer) {
          geoJsonLayer.eachLayer((layer) => layer.setStyle(defaultStyle));
        }
        updateSidebar();
        clearSavedState();
      });

      // ─── Export opposite mode ─────────────────────────────────────────

      const computeCentroid = (geometry) => {
        let sumLng = 0, sumLat = 0, count = 0;
        const addRing = (coords) => {
          for (const [lng, lat] of coords) {
            sumLng += lng;
            sumLat += lat;
            count++;
          }
        };
        if (geometry.type === 'Polygon') {
          addRing(geometry.coordinates[0]);
        } else if (geometry.type === 'MultiPolygon') {
          for (const polygon of geometry.coordinates) {
            addRing(polygon[0]);
          }
        }
        return count > 0 ? [sumLng / count, sumLat / count] : null;
      };

      const pointInRing = (point, ring) => {
        const [x, y] = point;
        let inside = false;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
          const [xi, yi] = ring[i];
          const [xj, yj] = ring[j];
          if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
            inside = !inside;
          }
        }
        return inside;
      };

      const pointInGeometry = (point, geometry) => {
        if (geometry.type === 'Polygon') {
          return pointInRing(point, geometry.coordinates[0]);
        }
        if (geometry.type === 'MultiPolygon') {
          return geometry.coordinates.some(poly => pointInRing(point, poly[0]));
        }
        return false;
      };

      exportOppositeBtn.addEventListener('click', async () => {
        if (selectedItems.size === 0) return;

        const state = getSelectedState();
        const oppositeMode = currentMode === 'tract' ? 'zip' : 'tract';
        const oppositeUrl = oppositeMode === 'tract' ? tractUrl(state.fips) : zipUrl(state.file);
        const oppositeLabel = oppositeMode === 'tract' ? 'tracts' : 'zips';

        exportOppositeBtn.disabled = true;
        exportOppositeBtn.textContent = 'Loading…';
        copyFeedback.textContent = '';

        try {
          const resp = await fetch(oppositeUrl);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const oppositeData = await resp.json();

          // Collect geometries of selected features
          const selectedGeometries = [];
          if (geoJsonLayer) {
            geoJsonLayer.eachLayer((layer) => {
              const id = layer.feature ? getFeatureId(layer.feature) : null;
              if (id && selectedItems.has(id) && layer.feature.geometry) {
                selectedGeometries.push(layer.feature.geometry);
              }
            });
          }

          // Find opposite features whose centroid falls within any selected feature
          const matchingIds = [];
          const features = oppositeData.features || [];
          for (const feature of features) {
            if (!feature.geometry) continue;
            const centroid = computeCentroid(feature.geometry);
            if (!centroid) continue;

            const isInside = selectedGeometries.some(geom => pointInGeometry(centroid, geom));
            if (isInside) {
              const props = feature.properties || {};
              let id;
              if (oppositeMode === 'tract') {
                id = props.GEOID;
              } else {
                id = props.ZCTA5CE10 || props.ZIP || props.ZIPCODE || props.zip;
              }
              if (id) matchingIds.push(String(id));
            }
          }

          const sorted = matchingIds.sort();
          const json = JSON.stringify(sorted, null, 2);

          try {
            await navigator.clipboard.writeText(json);
            copyFeedback.textContent = `Copied ${sorted.length} ${oppositeLabel}!`;
          } catch {
            copyFeedback.textContent = 'Copy failed — use HTTPS or localhost.';
          }
        } catch (err) {
          copyFeedback.textContent = `Failed to load ${oppositeLabel}: ${err.message}`;
        } finally {
          exportOppositeBtn.disabled = selectedItems.size === 0;
          exportOppositeBtn.textContent = currentMode === 'tract' ? 'Copy as Zips' : 'Copy as Tracts';
          setTimeout(() => { copyFeedback.textContent = ''; }, 3000);
        }
      });

      // ─── Import modal ─────────────────────────────────────────────────

      const openImportModal = () => {
        importTextarea.value = '';
        importError.textContent = '';
        importModal.classList.remove('hidden');
        importTextarea.focus();
      };

      const closeImportModal = () => {
        importModal.classList.add('hidden');
      };

      const applyImport = (ids) => {
        // Add imported IDs to selected set
        const newIds = new Set(ids.map(String));

        // Highlight matching polygons on the map
        if (geoJsonLayer) {
          geoJsonLayer.eachLayer((layer) => {
            const id = layer.feature ? getFeatureId(layer.feature) : null;
            if (id && newIds.has(id)) {
              selectedItems.add(id);
              layer.setStyle(selectedStyle);
            }
          });
        }

        // Also add IDs that don't match any current polygon (they stay in the set for export)
        newIds.forEach(id => selectedItems.add(id));

        updateSidebar();
        saveState();
      };

      importBtn.addEventListener('click', openImportModal);
      importCancel.addEventListener('click', closeImportModal);

      // Close on backdrop click
      importModal.addEventListener('click', (e) => {
        if (e.target === importModal) closeImportModal();
      });

      // Close on Escape
      importModal.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeImportModal();
      });

      importConfirm.addEventListener('click', () => {
        const raw = importTextarea.value.trim();
        if (!raw) {
          importError.textContent = 'Paste a JSON array first.';
          return;
        }

        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (e) {
          importError.textContent = `Invalid JSON: ${e.message}`;
          return;
        }

        if (!Array.isArray(parsed)) {
          importError.textContent = 'Expected a JSON array (e.g. ["20814", "20815"]).';
          return;
        }

        // Allow strings or numbers
        const ids = parsed.map(item => {
          if (typeof item === 'string') return item;
          if (typeof item === 'number') return String(item);
          return null;
        });

        if (ids.some(id => id === null)) {
          importError.textContent = 'Array must contain only strings or numbers.';
          return;
        }

        if (ids.length === 0) {
          importError.textContent = 'Array is empty.';
          return;
        }

        applyImport(ids);
        closeImportModal();
      });

      // ─── Invalidate map size on resize ─────────────────────────────────

      window.addEventListener('resize', () => {
        map.invalidateSize();
      });

      // ─── Initial load ──────────────────────────────────────────────────

      const savedState = loadSavedState();
      if (savedState) {
        // Restore dropdowns to saved values
        stateSelect.value = savedState.state;
        currentMode = savedState.mode;
        modeSelect.value = savedState.mode;
      }

      updateModeUI();
      loadData(savedState ? savedState.selections : null);

      // ─── Service Worker registration ───────────────────────────────────

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    })();
  </script>
</body>
</html>
